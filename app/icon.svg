<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a7c9e"/>
      <stop offset="100%" stop-color="#2d5a7a"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Open book: left page fanning upward from spine -->
  <path d="M32,20 C24,16 16,17 12,21 L12,43 C16,47 24,48 32,44 Z" fill="#e8e0d5" opacity="0.9"/>
  <!-- Open book: right page fanning upward from spine -->
